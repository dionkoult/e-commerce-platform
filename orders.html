<!DOCTYPE html>
<html>
  <head>
    <title>Orders</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/orders.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/Favicon_Black.png">

    <!-- Open Graph (Teams, LinkedIn, Facebook, Discord, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="E-commerce Platform">
    <meta property="og:description" content="Shopping and more.">
    <meta property="og:url" content="https://dionkoult.github.io/e-commerce-platform/">
    <meta property="og:image" content="https://dionkoult.github.io/e-commerce-platform/images/Project_Featured.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="E-commerce Platform">
    <meta name="twitter:description" content="Shopping and more.">
    <meta name="twitter:image" content="https://dionkoult.github.io/e-commerce-platform/images/Project_Featured.png">
  </head>
  <body>
    <div class="amazon-header">
      <div class="amazon-header-left-section">
        <a href="index.html" class="header-link1">
          <img class="amazon-logo"
            src="images/Logo_White.svg">
          <img class="amazon-mobile-logo"
            src="images/Favicon_Black.png">
        </a>
      </div>

      <div class="amazon-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">

        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="amazon-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity"></div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="page-title">
        Your Orders
        <button class="clear-button js-clear-button">
          Clear
        </button>
      </div>

      <div class="orders-grid">
        
      </div>
    </div>
    <script type="module" src="scripts/order/orders.js"></script>
  </body>
</html>
