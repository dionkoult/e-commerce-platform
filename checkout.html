<!DOCTYPE html>
<html>
  <head>
    <title>Checkout</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/pages/checkout/checkout-header.css">
    <link rel="stylesheet" href="styles/pages/checkout/checkout.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/Favicon_Black.png">

    <!-- Open Graph (Teams, LinkedIn, Facebook, Discord, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="E-commerce Platform">
    <meta property="og:description" content="Shopping and more.">
    <meta property="og:url" content="https://dionkoult.github.io/e-commerce-platform/">
    <meta property="og:image" content="https://dionkoult.github.io/e-commerce-platform/images/Project_Featured.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="E-commerce Platform">
    <meta name="twitter:description" content="Shopping and more.">
    <meta name="twitter:image" content="https://dionkoult.github.io/e-commerce-platform/images/Project_Featured.png">
  </head>
  <body>
    <div class="checkout-header">
      <div class="header-content">
        <div class="checkout-header-left-section">
          <a href="index.html">
            <img class="amazon-logo" src="images/Logo_Black.svg">
            <img class="amazon-mobile-logo" src="images/Favicon_White.png">
          </a>
        </div>

        <div class="checkout-header-middle-section">
        </div>

        <div class="checkout-header-right-section">
          <img src="images/icons/checkout-lock-icon.png">
        </div>
      </div>
    </div>

    <div class="main">
      <div class="checkout-header-container">
        <div class="page-title">Review your order</div>
        <button class="clear-button js-checkout-clear-btn">
          Clear
        </button>
      </div>
      
      <div class="checkout-grid">
        <div class="order-summary js-order-summary"></div>

        <div class="payment-summary js-payment-summary">
        
        </div>
      </div>
    </div>

    <script type="module" src="scripts/checkout.js"></script>
  </body>
</html>
